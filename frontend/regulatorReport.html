<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regulator Report — Fairtrust AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #F4F6F8;
            --bg-secondary: #EEF1F5;
            --surface: #FFFFFF;
            --border-light: #E2E8F0;
            --border-medium: #D1D5DB;
            --text-primary: #1A2D4E;
            --text-secondary: #3D4560;
            --text-tertiary: #5A6169;
            --accent: #1A2D4E;
            --accent-light: rgba(235,178,85,0.10);
            --gold: #EBB255; --gold-2: #D99A2B; --gold-border: rgba(235,178,85,0.25);
            --success: #00C896;
            --success-light: rgba(0,200,150,0.12);
            --warning: #FFB020;
            --warning-light: rgba(255,176,32,0.12);
            --danger: #FF5C38;
            --danger-light: rgba(255,92,56,0.12);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
            --transition: all 0.2s ease;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* ================= HEADER ================= */
        header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.01em;
        }

        .logo span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-tertiary);
            font-size: 0.875rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        /* ================= MAIN CONTAINER ================= */
        .regulator-report {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        /* ================= REPORT HEADER ================= */
        .report-header {
            margin-bottom: 3rem;
        }

        .report-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .eval-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.75rem;
        }

        .dashboard-link {
            color: var(--text-tertiary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .dashboard-link:hover {
            color: var(--accent);
        }

        .report-header h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .report-header p {
            color: var(--text-tertiary);
            font-size: 0.9375rem;
            max-width: 600px;
        }

        /* ================= CERTIFICATE ================= */
        .certificate {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 3rem;
            margin-bottom: 3rem;
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        .certificate-gold-border {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 1px solid var(--gold);
            border-radius: calc(var(--radius-lg) - 4px);
            opacity: 0.3;
            pointer-events: none;
        }

        .certificate-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .certificate-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .certificate-header p {
            color: var(--text-tertiary);
            font-size: 0.875rem;
        }

        .certificate-seal {
            width: 64px;
            height: 64px;
            background: var(--gold);
            border-radius: 50%;
            margin: 1.5rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            box-shadow: 0 4px 12px rgba(180,83,9,0.2);
        }

        .certificate-body {
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
        }

        .certificate-org {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0.5rem 0 0.25rem;
            letter-spacing: -0.02em;
        }

        .certificate-model {
            color: var(--text-tertiary);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        .score-display {
            display: inline-block;
            padding: 0.75rem 2rem;
            border-radius: 999px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            margin: 1rem 0;
        }

        .score-display.certified { background: var(--success); }
        .score-display.conditional { background: var(--warning); }
        .score-display.not-certified { background: var(--danger); }

        .certificate-dates {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
            color: var(--text-tertiary);
            font-size: 0.875rem;
        }

        .certificate-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-light);
        }

        .signature {
            text-align: center;
        }

        .signature-line {
            width: 200px;
            height: 1px;
            background: var(--text-primary);
            margin: 0.5rem 0;
        }

        .signature-name {
            font-size: 0.875rem;
            font-weight: 600;
        }

        .signature-title {
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }

        .download-btn {
            margin-top: 1.5rem;
            text-align: center;
        }

        /* ================= SECTIONS ================= */
        .report-section {
            margin-bottom: 2.5rem;
        }

        .section-header {
            margin-bottom: 1.5rem;
        }

        .section-header h3 {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .section-header p {
            color: var(--text-tertiary);
            font-size: 0.875rem;
        }

        /* ================= COMPLIANCE TABLE ================= */
        .compliance-summary {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .summary-item {
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .summary-item strong {
            color: var(--text-primary);
            margin-left: 0.25rem;
        }

        .compliance-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .compliance-table th {
            text-align: left;
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .compliance-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-light);
        }

        .compliance-table tr:last-child td {
            border-bottom: none;
        }

        .status-pass {
            color: var(--success);
            font-weight: 600;
        }

        .status-fail {
            color: var(--danger);
            font-weight: 600;
        }

        /* ================= AUDIT TRAIL ================= */
        .audit-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .timeline {
            position: relative;
            padding: 0.5rem 0;
        }

        .timeline-item {
            position: relative;
            padding-left: 2rem;
            padding-bottom: 1.5rem;
        }

        .timeline-item:last-child {
            padding-bottom: 0;
        }

        .timeline-dot {
            position: absolute;
            left: 0;
            top: 0.25rem;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 3px;
            top: 12px;
            bottom: 0;
            width: 2px;
            background: var(--accent-light);
        }

        .timeline-item:last-child::before {
            display: none;
        }

        .timeline-date {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-bottom: 0.25rem;
        }

        .timeline-title {
            font-weight: 600;
            font-size: 0.9375rem;
            margin-bottom: 0.25rem;
        }

        .timeline-detail {
            color: var(--text-tertiary);
            font-size: 0.8125rem;
        }

        .shap-summary {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
        }

        .shap-summary h4 {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .shap-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.8125rem;
        }

        .shap-item:last-child {
            border-bottom: none;
        }

        .shap-label {
            color: var(--text-tertiary);
        }

        .shap-value {
            font-weight: 500;
            color: var(--text-primary);
        }

        /* ================= LEGAL FRAMEWORKS ================= */
        .legal-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .legal-card {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            transition: var(--transition);
        }

        .legal-card:hover {
            border-color: var(--border-medium);
            box-shadow: var(--shadow-sm);
        }

        .legal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .legal-title {
            font-weight: 600;
            font-size: 0.9375rem;
        }

        .legal-status {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .legal-status.compliant {
            background: var(--success-light);
            color: var(--success);
        }

        .legal-status.ready {
            background: var(--accent-light);
            color: var(--accent);
        }

        .legal-status.review {
            background: var(--warning-light);
            color: var(--warning);
        }

        .legal-note {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            line-height: 1.5;
        }

        /* ================= BUTTONS ================= */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            border-radius: var(--radius-lg);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #1D4ED8;
        }

        .btn-secondary {
            background: var(--surface);
            border-color: var(--border-light);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .export-bar {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-light);
        }

        /* ================= LOADING STATE ================= */
        .loading-state {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 4rem 2rem;
            text-align: center;
            max-width: 500px;
            margin: 2rem auto;
        }

        .loading-state h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .loading-state p {
            color: var(--text-tertiary);
            font-size: 0.9375rem;
            margin-bottom: 1.5rem;
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 768px) {
            .regulator-report {
                padding: 2rem 1rem;
            }
            
            .certificate {
                padding: 2rem 1.5rem;
            }
            
            .audit-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            
            .legal-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .certificate-footer {
                flex-direction: column;
                gap: 1.5rem;
                align-items: center;
            }
            
            .certificate-dates {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .export-bar {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
            }
        }

        @media print {
            header, .export-bar, .dashboard-link, .download-btn {
                display: none !important;
            }
            
            body {
                background: white;
            }
            
            .certificate {
                border: 1px solid #000;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
                <div style="width:34px;height:34px;background:linear-gradient(135deg,#1A2D4E,#253d66);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <div><div style="font-size:0.9375rem;font-weight:800;color:#1A2D4E;line-height:1.1;">FairTrust AI</div><div style="font-size:0.6rem;font-weight:600;letter-spacing:0.1em;color:#EBB255;text-transform:uppercase;">Ethical AI Framework</div></div>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="upload.html">Upload</a>
                <a href="docs.html">Docs</a>
                <a href="admin.html">Admin</a>
            </div>
        </nav>
    </header>

    <main class="regulator-report" id="app">
        <div class="loading-state">
            <h2>Loading report…</h2>
            <p>Fetching certification data from the evaluation.</p>
        </div>
    </main>

    <script>
        const API_BASE = 'http://127.0.0.1:5000';

        function renderNoData(msg) {
            document.getElementById('app').innerHTML = `
                <div class="loading-state">
                    <h2>No report found</h2>
                    <p>${msg || 'Complete an evaluation first.'}</p>
                    <a href="upload.html" class="btn btn-primary" style="display:inline-flex;margin-top:0.5rem">Start evaluation</a>
                </div>`;
        }

        // ── Certificate ───────────────────────────────────────────────────────
        function renderCertificate(cert, evalId) {
            const badgeClass = cert.certified ? 'certified'
                : cert.status === 'CONDITIONAL' ? 'conditional' : 'not-certified';
            const badgeLabel = cert.certified
                ? `Fairtrust Score: ${cert.fairness_score}`
                : `Score: ${cert.fairness_score} — Conditional`;

            return `
            <section class="certificate">
                <div class="certificate-gold-border"></div>
                <div class="certificate-header">
                    <h2>Certificate of Fairtrust AI Compliance</h2>
                    <p>Issued by the Fairtrust AI Framework</p>
                    <div class="certificate-seal"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg></div>
                </div>
                <div class="certificate-body">
                    <p style="color: var(--text-tertiary);">This is to certify that</p>
                    <div class="certificate-org">${cert.organization}</div>
                    <div class="certificate-model">Model ID: ${cert.model_name}</div>
                    <div class="score-display ${badgeClass}">${badgeLabel}</div>
                    <div class="certificate-dates">
                        <div><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;vertical-align:-2px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Issued: ${cert.issued_at}</div>
                        <div><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;vertical-align:-2px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Valid until: ${cert.valid_until}</div>
                    </div>
                    <p style="color: var(--text-tertiary); font-size: 0.875rem; line-height: 1.6;">
                        This model has been evaluated across all 7 fairness dimensions<br>
                        and ${cert.certified ? 'meets' : 'partially meets'} the required standards for ethical AI deployment.
                    </p>
                </div>
                <div class="certificate-footer">
                    <div class="signature">
                        <div class="signature-line"></div>
                        <div class="signature-name">Fairtrust AI Framework</div>
                        <div class="signature-title">Automated Ethics Certification</div>
                    </div>
                    <div class="eval-badge">Eval ID: ${evalId || '—'}</div>
                </div>
                <div class="download-btn">
                    <button class="btn btn-primary" onclick="downloadPDF()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Certificate PDF</button>
                </div>
            </section>`;
        }

        // ── Compliance table ──────────────────────────────────────────────────
        function renderCompliance(compliance, summary) {
            const rows = compliance.map(r => `
                <tr>
                    <td>${r.requirement}</td>
                    <td>${r.threshold}</td>
                    <td>${r.achieved}</td>
                    <td class="${r.passed ? 'status-pass' : 'status-fail'}">${r.passed ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Pass' : '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Fail'}</td>
                </tr>`).join('');

            return `
            <section class="report-section">
                <div class="section-header">
                    <h3>Fairness Contract Compliance</h3>
                    <p>Detailed evaluation against predefined fairness thresholds</p>
                </div>
                
                <div class="compliance-summary">
                    <div class="summary-item">Total Requirements <strong>${summary.total}</strong></div>
                    <div class="summary-item">Passed <strong style="color: var(--success);">${summary.passed}</strong></div>
                    ${summary.failed > 0 ? `<div class="summary-item">Failed <strong style="color: var(--danger);">${summary.failed}</strong></div>` : ''}
                </div>

                <table class="compliance-table">
                    <thead>
                        <tr>
                            <th>Requirement</th>
                            <th>Threshold</th>
                            <th>Achieved</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </section>`;
        }

        // ── Audit trail ───────────────────────────────────────────────────────
        function renderAudit(auditTrail, shapAudit) {
            const timelineItems = auditTrail.map(e => `
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="timeline-date">${e.timestamp}</div>
                    <div class="timeline-title">${e.title}</div>
                    <div class="timeline-detail">${e.detail}</div>
                </div>`).join('');

            return `
            <section class="report-section">
                <div class="section-header">
                    <h3>Audit Trail</h3>
                    <p>Complete evaluation history and model analysis</p>
                </div>

                <div class="audit-grid">
                    <div class="timeline">${timelineItems}</div>
                    
                    <div class="shap-summary">
                        <h4>SHAP Analysis Summary</h4>
                        ${shapAudit && shapAudit.top_feature ? `
                            <div class="shap-item">
                                <span class="shap-label">Feature Stability</span>
                                <span class="shap-value">${shapAudit.stability_pct}%</span>
                            </div>
                            <div class="shap-item">
                                <span class="shap-label">SHAP Value Range</span>
                                <span class="shap-value">${shapAudit.shap_range}</span>
                            </div>
                            <div class="shap-item">
                                <span class="shap-label">Top Feature</span>
                                <span class="shap-value">${shapAudit.top_feature}</span>
                            </div>
                            <div class="shap-item">
                                <span class="shap-label">Top Feature SHAP</span>
                                <span class="shap-value">${shapAudit.top_feature_shap}</span>
                            </div>
                        ` : `
                            <p style="color: var(--text-tertiary); font-style: italic; margin: 0;">No SHAP data available</p>
                        `}
                    </div>
                </div>
            </section>`;
        }

        // ── Legal section ─────────────────────────────────────────────────────
        function renderLegal(legal) {
            const frameworks = (legal.frameworks || []).map(f => {
                const statusClass = f.status === 'COMPLIANT' ? 'compliant'
                    : f.status === 'READY' ? 'ready' : 'review';
                return `
                <div class="legal-card">
                    <div class="legal-header">
                        <span class="legal-title">${f.label}</span>
                        <span class="legal-status ${statusClass}">${f.status}</span>
                    </div>
                    <p class="legal-note">${f.note}</p>
                </div>`;
            }).join('');

            return `
            <section class="report-section">
                <div class="section-header">
                    <h3>Regulatory Compliance</h3>
                    <p>Alignment with global AI governance frameworks</p>
                </div>
                <div class="legal-grid">${frameworks}</div>
            </section>`;
        }

        // ── Full render ───────────────────────────────────────────────────────
        function renderReport(data, evalId) {
            document.getElementById('app').innerHTML = `
                <div class="report-header">
                    <div class="report-meta">
                        <span class="eval-badge">Evaluation ID: ${evalId || '—'}</span>
                        <a href="upload.html" class="dashboard-link">← New Analysis</a>
                    </div>
                    <h1>Regulator Report</h1>
                    <p>Comprehensive fairness audit for regulatory compliance and certification</p>
                </div>
                
                ${renderCertificate(data.certificate, evalId)}
                ${renderCompliance(data.compliance, data.compliance_summary)}
                ${renderAudit(data.audit_trail, data.shap_audit)}
                ${renderLegal(data.legal)}
                
                <div class="export-bar">
                    <button class="btn btn-primary" onclick="exportPDF()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Export PDF Report</button>
                    <button class="btn btn-secondary" onclick="exportJSON()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export JSON</button>
                    <button class="btn btn-secondary" onclick="window.print()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Print</button>
                </div>
            `;
        }

        // ── Actions ───────────────────────────────────────────────────────────
        function downloadPDF()  { alert('Preparing certificate PDF…'); }
        function exportPDF()    { alert('Exporting full regulator report as PDF…'); }
        function exportJSON() {
            const cached = sessionStorage.getItem('eval_result');
            if (!cached) { alert('No data to export.'); return; }
            const blob = new Blob([cached], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = 'regulator_report.json'; a.click();
        }

        // ── Init ──────────────────────────────────────────────────────────────
        (async function init() {
            const evalId = new URLSearchParams(location.search).get('eval_id')
                        || sessionStorage.getItem('eval_id');

            if (!evalId) { renderNoData('No evaluation ID found.'); return; }

            try {
                const res  = await fetch(`${API_BASE}/report/regulator/${evalId}`);
                const data = await res.json();

                if (res.ok && data.status === 'complete') {
                    renderReport(data, evalId);
                } else {
                    throw new Error(data.error || 'not complete');
                }
            } catch (_) {
                // Fallback: build a minimal view from cached eval_result
                const cached = sessionStorage.getItem('eval_result');
                if (cached) {
                    const raw     = JSON.parse(cached);
                    const fairness = raw.fairness || {};
                    const score   = raw.ethical_score || 0;
                    const now     = new Date();

                    const RULES = [
                        { key: "disparateImpact",    min: 0.80, label: "80% Rule (Disparate Impact)" },
                        { key: "groupFairness",      min: 0.80, label: "Group Fairness" },
                        { key: "individualFairness", min: 0.85, label: "Individual Fairness" },
                        { key: "counterfactual",     min: 0.90, label: "Counterfactual Fairness" },
                    ];
                    
                    const compliance = RULES.map(r => {
                        const v = fairness[r.key] || 0;
                        const passed = v >= r.min;
                        return { 
                            requirement: r.label, 
                            threshold: `≥ ${r.min}`, 
                            achieved: v.toFixed(4), 
                            passed, 
                            status: passed ? 'PASS' : 'FAIL' 
                        };
                    });
                    
                    const passed = compliance.filter(r => r.passed).length;

                    renderReport({
                        certificate: {
                            organization:  "Fairtrust AI",
                            model_name:    raw.model_id || "Unknown",
                            fairness_score: score,
                            issued_at:     now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
                            valid_until:   new Date(now.setFullYear(now.getFullYear() + 1)).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
                            certified:     passed === compliance.length,
                            status:        passed === compliance.length ? 'CERTIFIED' : 'CONDITIONAL',
                        },
                        compliance,
                        compliance_summary: { total: compliance.length, passed, failed: compliance.length - passed, all_passed: passed === compliance.length },
                        audit_trail: [{ timestamp: new Date().toUTCString(), title: "Evaluation Complete", detail: `Score: ${score}` }],
                        shap_audit:  raw.shap ? { 
                            top_feature: raw.shap.topFeature, 
                            stability_pct: Math.round((raw.shap.featureStability || 0) * 100), 
                            shap_range: `[${raw.shap.shapMin}, ${raw.shap.shapMax}]`, 
                            top_feature_shap: raw.shap.shapMax 
                        } : {},
                        legal: { frameworks: [
                            { label: "India — NITI Aayog", note: "Aligned with Responsible AI principles.", status: "COMPLIANT" },
                            { label: "EU AI Act", note: "Transparency and documentation requirements met.", status: score >= 0.75 ? "READY" : "REVIEW" },
                            { label: "GDPR", note: "Right to explanation supported.", status: "COMPLIANT" },
                        ]},
                    }, evalId);
                    return;
                }
                renderNoData('Could not load regulator report.');
            }
        })();
    </script>
</body>
</html>
