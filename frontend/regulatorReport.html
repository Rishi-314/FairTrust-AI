<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regulator Report — FairTrust AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy:      #0F1E38; --navy-mid:  #1A2D4E; --navy-soft: #243D65;
            --gold:      #EBB255; --gold-dim:  rgba(235,178,85,0.12); --gold-line: rgba(235,178,85,0.3);
            --red:       #EF4444; --red-dim:   rgba(239,68,68,0.1);
            --amber:     #F59E0B; --amber-dim: rgba(245,158,11,0.1);
            --green:     #10B981; --green-dim: rgba(16,185,129,0.1);
            --blue:      #3B82F6; --blue-dim:  rgba(59,130,246,0.1);
            --surface:   #FFFFFF; --bg: #F1F3F8; --bg2: #E8EBF2; --rule: #DDE1EC;
            --text:      #0F1E38; --muted: #64748B;
            --mono: 'IBM Plex Mono', monospace; --display: 'Plus Jakarta Sans', sans-serif; --body: 'Plus Jakarta Sans', sans-serif;
            --radius: 12px; --shadow: 0 2px 12px rgba(15,30,56,0.07); --shadow-md: 0 8px 32px rgba(15,30,56,0.10);
        }
        body { font-family: var(--body); background: var(--bg); color: var(--text); min-height: 100vh; }
        .navbar { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid var(--rule); display: flex; align-items: center; justify-content: space-between; padding: 0 2.5rem; height: 60px; }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .nav-logo-icon { width: 34px; height: 34px; background: var(--navy); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
        .nav-logo-icon svg { width: 20px; height: 20px; }
        .nav-logo-name { font-family: var(--display); font-weight: 800; font-size: 1.0625rem; color: var(--navy); }
        .nav-logo-name span { color: var(--gold); }
        .nav-links { display: flex; gap: 0.25rem; }
        .nav-links a { font-size: 0.875rem; font-weight: 600; color: var(--muted); text-decoration: none; padding: 0.375rem 0.75rem; border-radius: 7px; transition: color 0.15s, background 0.15s; }
        .nav-links a:hover { color: var(--navy); background: var(--bg); }
        .page { max-width: 900px; margin: 0 auto; padding: 2rem 2rem 5rem; }
        .section { background: var(--surface); border: 1.5px solid var(--rule); border-radius: 14px; margin-bottom: 1.25rem; box-shadow: var(--shadow); overflow: hidden; }
        .section-head { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 1px solid var(--rule); background: var(--bg); }
        .section-title { font-size: 0.9375rem; font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 8px; }
        .section-title i { color: var(--gold); font-size: 0.875rem; }
        .section-body { padding: 1.5rem; }
        .report-hero { background: linear-gradient(145deg, var(--navy) 0%, var(--navy-mid) 60%, var(--navy-soft) 100%); border-radius: 16px; padding: 2rem 2.5rem; margin-bottom: 1.25rem; position: relative; overflow: hidden; }
        .report-hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 240px; height: 240px; border-radius: 50%; background: radial-gradient(circle, rgba(235,178,85,0.08) 0%, transparent 70%); }
        .hero-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(235,178,85,0.15); border: 1px solid var(--gold-line); border-radius: 999px; padding: 4px 14px; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
        .hero-title { font-family: var(--display); font-size: 1.875rem; font-weight: 800; color: white; line-height: 1.15; margin-bottom: 0.75rem; }
        .hero-sub { font-size: 0.875rem; color: rgba(255,255,255,0.5); margin-bottom: 1.5rem; }
        .hero-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        .btn-hero { display: inline-flex; align-items: center; gap: 6px; padding: 0.6rem 1.25rem; border-radius: 9px; font-size: 0.875rem; font-weight: 600; cursor: pointer; border: none; font-family: var(--body); transition: all 0.15s; }
        .btn-hero-primary { background: var(--gold); color: var(--navy); }
        .btn-hero-primary:hover { background: #f0bc60; }
        .btn-hero-ghost { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); }
        .btn-hero-ghost:hover { background: rgba(255,255,255,0.14); color: white; }
        .verdict-row { display: flex; align-items: stretch; gap: 1.5rem; margin-top: 1.5rem; flex-wrap: wrap; }
        .verdict-score-box { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1.25rem 1.75rem; text-align: center; min-width: 160px; }
        .verdict-score-num { font-family: var(--display); font-size: 3rem; font-weight: 800; line-height: 1; }
        .verdict-score-sub { font-size: 0.6875rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-top: 4px; }
        .verdict-score-label { font-size: 0.8125rem; font-weight: 700; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
        .verdict-breakdown { flex: 1; min-width: 220px; display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .verdict-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 0.75rem 1rem; }
        .verdict-item-label { font-size: 0.625rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 4px; }
        .verdict-item-val { font-family: var(--mono); font-size: 0.9375rem; font-weight: 700; color: white; }
        .alert-banner { border-radius: 10px; padding: 1rem 1.25rem; display: flex; align-items: flex-start; gap: 12px; margin-bottom: 1.25rem; border: 1.5px solid; }
        .alert-banner.fail { background: rgba(239,68,68,0.06); border-color: rgba(239,68,68,0.25); }
        .alert-banner.warn { background: rgba(245,158,11,0.06); border-color: rgba(245,158,11,0.25); }
        .alert-banner.ok   { background: rgba(16,185,129,0.06); border-color: rgba(16,185,129,0.25); }
        .alert-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .alert-icon.fail { background: rgba(239,68,68,0.1); color: var(--red); }
        .alert-icon.warn { background: rgba(245,158,11,0.1); color: var(--amber); }
        .alert-icon.ok   { background: rgba(16,185,129,0.1); color: var(--green); }
        .alert-title { font-size: 0.9375rem; font-weight: 700; color: var(--navy); }
        .alert-sub   { font-size: 0.8125rem; color: var(--muted); margin-top: 3px; line-height: 1.5; }
        /* Certificate */
        .cert-wrap { background: white; border: 2px solid var(--rule); border-radius: 12px; overflow: hidden; position: relative; }
        .cert-corner { position: absolute; width: 28px; height: 28px; }
        .cert-corner.tl { top: 10px; left: 10px; border-top: 2px solid var(--gold-line); border-left: 2px solid var(--gold-line); }
        .cert-corner.tr { top: 10px; right: 10px; border-top: 2px solid var(--gold-line); border-right: 2px solid var(--gold-line); }
        .cert-corner.bl { bottom: 10px; left: 10px; border-bottom: 2px solid var(--gold-line); border-left: 2px solid var(--gold-line); }
        .cert-corner.br { bottom: 10px; right: 10px; border-bottom: 2px solid var(--gold-line); border-right: 2px solid var(--gold-line); }
        .cert-header { background: var(--navy); padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        .cert-header-left { display: flex; align-items: center; gap: 12px; }
        .cert-seal { width: 44px; height: 44px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--navy); font-size: 18px; flex-shrink: 0; }
        .cert-issuer { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
        .cert-issuer-name { font-family: var(--display); font-weight: 800; color: white; font-size: 1rem; }
        .cert-status-pill { padding: 6px 16px; border-radius: 999px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
        .cert-status-pill.certified   { background: rgba(16,185,129,0.18); color: #34D399; border: 1px solid rgba(16,185,129,0.3); }
        .cert-status-pill.conditional { background: rgba(245,158,11,0.18); color: #FBBF24; border: 1px solid rgba(245,158,11,0.3); }
        .cert-status-pill.fail        { background: rgba(239,68,68,0.18); color: #F87171; border: 1px solid rgba(239,68,68,0.3); }
        .cert-body { padding: 2rem; display: grid; grid-template-columns: 1fr auto; gap: 1.5rem; align-items: start; }
        .cert-certifies { font-size: 0.8125rem; color: var(--muted); margin-bottom: 6px; }
        .cert-org { font-family: var(--display); font-size: 1.75rem; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
        .cert-model { font-size: 0.875rem; color: var(--muted); display: flex; align-items: center; gap: 6px; margin-bottom: 1.25rem; }
        .cert-model i { color: var(--gold); }
        .cert-score-badge { display: inline-flex; align-items: center; gap: 8px; padding: 0.625rem 1.5rem; border-radius: 999px; font-size: 1rem; font-weight: 700; }
        .cert-score-badge.certified   { background: var(--green-dim); color: var(--green); border: 1.5px solid rgba(16,185,129,0.3); }
        .cert-score-badge.conditional { background: var(--amber-dim); color: var(--amber); border: 1.5px solid rgba(245,158,11,0.3); }
        .cert-score-badge.fail        { background: var(--red-dim); color: var(--red); border: 1.5px solid rgba(239,68,68,0.3); }
        .cert-dates { display: flex; gap: 1.5rem; margin-top: 1.25rem; }
        .cert-date { font-size: 0.8125rem; color: var(--muted); display: flex; align-items: center; gap: 5px; }
        .cert-date i { color: var(--gold); }
        .cert-date strong { color: var(--navy); }
        .cert-qr-wrap { text-align: center; }
        .cert-qr { width: 80px; height: 80px; background: var(--bg); border: 1.5px solid var(--rule); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--muted); text-align: center; padding: 8px; font-family: var(--mono); line-height: 1.4; }
        .cert-id-label { font-size: 0.6875rem; color: var(--muted); margin-top: 6px; font-family: var(--mono); }
        .cert-statement { background: var(--bg); border-top: 1px solid var(--rule); padding: 1rem 2rem; font-size: 0.8125rem; color: var(--muted); line-height: 1.6; }
        .cert-statement strong { color: var(--navy); }
        /* Compliance table */
        .compliance-chips { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
        .chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 999px; font-size: 0.8125rem; font-weight: 600; }
        .chip-neutral { background: var(--bg2); color: var(--navy); border: 1px solid var(--rule); }
        .chip-pass    { background: var(--green-dim); color: var(--green); }
        .chip-fail    { background: var(--red-dim); color: var(--red); }
        .compliance-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        .compliance-table thead th { padding: 0.75rem 1rem; text-align: left; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); background: var(--bg); border-bottom: 1.5px solid var(--rule); }
        .compliance-table tbody td { padding: 0.875rem 1rem; border-bottom: 1px solid var(--rule); color: var(--navy); vertical-align: middle; }
        .compliance-table tbody tr:last-child td { border-bottom: none; }
        .compliance-table tbody tr:hover td { background: var(--bg); }
        .compliance-table .req-name { font-weight: 600; }
        .compliance-table .req-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
        .compliance-table .mono-val { font-family: var(--mono); font-size: 0.8125rem; }
        .status-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
        .status-pill.pass { background: var(--green-dim); color: var(--green); }
        .status-pill.fail { background: var(--red-dim); color: var(--red); }
        .status-pill.warn { background: var(--amber-dim); color: var(--amber); }
        /* Dim mini cards */
        .dim-overview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; }
        .dim-mini-card { border: 1.5px solid var(--rule); border-radius: 10px; padding: 1rem; display: flex; flex-direction: column; gap: 4px; transition: border-color 0.15s; }
        .dim-mini-card.pass-card { border-color: rgba(16,185,129,0.25); }
        .dim-mini-card.warn-card { border-color: rgba(245,158,11,0.25); }
        .dim-mini-card.fail-card { border-color: rgba(239,68,68,0.25); }
        .dim-mini-name { font-size: 0.75rem; font-weight: 600; color: var(--navy); }
        .dim-mini-score { font-family: var(--display); font-size: 1.25rem; font-weight: 800; line-height: 1; }
        .dim-mini-score.pass { color: var(--green); } .dim-mini-score.warn { color: var(--amber); } .dim-mini-score.fail { color: var(--red); }
        .dim-mini-bar { height: 3px; background: var(--bg2); border-radius: 100px; margin-top: 6px; overflow: hidden; }
        .dim-mini-fill { height: 100%; border-radius: 100px; }
        .dim-mini-fill.pass { background: var(--green); } .dim-mini-fill.warn { background: var(--amber); } .dim-mini-fill.fail { background: var(--red); }
        .dim-mini-status { font-size: 0.625rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
        .dim-mini-status.pass { color: var(--green); } .dim-mini-status.warn { color: var(--amber); } .dim-mini-status.fail { color: var(--red); }
        /* Timeline */
        .timeline { position: relative; }
        .timeline::before { content: ''; position: absolute; left: 19px; top: 8px; bottom: 8px; width: 2px; background: var(--rule); }
        .timeline-item { position: relative; padding: 0 0 1.5rem 52px; }
        .timeline-item:last-child { padding-bottom: 0; }
        .timeline-dot { position: absolute; left: 12px; top: 3px; width: 16px; height: 16px; border-radius: 50%; background: var(--gold); border: 3px solid var(--surface); box-shadow: 0 0 0 2px var(--gold-line); }
        .timeline-ts { font-size: 0.75rem; font-weight: 600; color: var(--gold); font-family: var(--mono); margin-bottom: 3px; }
        .timeline-event { font-size: 0.9375rem; font-weight: 700; color: var(--navy); }
        .timeline-detail { font-size: 0.8125rem; color: var(--muted); margin-top: 3px; line-height: 1.5; }
        /* SHAP audit */
        .shap-audit-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-top: 1.25rem; }
        .shap-audit-card { background: var(--bg); border: 1px solid var(--rule); border-radius: 9px; padding: 0.875rem 1rem; }
        .shap-audit-label { font-size: 0.6875rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
        .shap-audit-val { font-family: var(--mono); font-size: 1rem; font-weight: 700; color: var(--navy); }
        .shap-audit-sub { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }

        /* ── LEGAL TABLE (same style as remediation report) ── */
        .legal-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        .legal-table th { background: var(--bg2); padding: 8px 12px; text-align: left; font-weight: 700; font-size: 0.75rem; color: var(--navy); border-bottom: 1.5px solid var(--rule); }
        .legal-table td { padding: 0.875rem 12px; border-bottom: 1px solid var(--rule); vertical-align: middle; }
        .legal-table tr:last-child td { border-bottom: none; }
        .legal-table tr:hover td { background: var(--bg); }
        .legal-fw   { font-weight: 600; color: var(--navy); font-size: 0.875rem; }
        .legal-note { font-size: 0.75rem; color: var(--muted); margin-top: 2px; line-height: 1.45; }
        .legal-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 700; white-space: nowrap; }
        .legal-pill.pass    { background: var(--green-dim); color: var(--green); }
        .legal-pill.warn    { background: var(--amber-dim); color: var(--amber); }
        .legal-pill.fail    { background: var(--red-dim);   color: var(--red); }
        .legal-pill.neutral { background: var(--bg2); color: var(--muted); border: 1px solid var(--rule); }

        @media print {
            @page { size: A4; margin: 12mm; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .navbar, .hero-actions, .btn-hero, .no-print { display: none !important; }
            body { background: white !important; }
            .section, .report-hero, .cert-wrap { box-shadow: none !important; break-inside: avoid; }
            .page { padding: 0 !important; }
        }
        .state-wrap { text-align: center; padding: 5rem 2rem; }
        .state-icon { font-size: 2.5rem; margin-bottom: 1rem; }
        .state-title { font-family: var(--display); font-size: 1.25rem; font-weight: 700; color: var(--navy); margin-bottom: 0.5rem; }
        .state-sub { font-size: 0.9rem; color: var(--muted); }
    </style>
</head>

<nav class="navbar">
    <a href="upload.html" class="nav-logo">
        <div class="nav-logo-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 3L4 7V13C4 17.42 7.58 21.29 12 22C16.42 21.29 20 17.42 20 13V7L12 3Z" fill="white" fill-opacity="0.15"/>
                <path d="M9 12L11.5 14.5L16 10" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <span class="nav-logo-name">Fair<span>Trust</span></span>
    </a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="docs.html">Docs</a>
        <a href="admin.html">Admin</a>
    </div>
</nav>

<main class="page" id="app">
    <div class="state-wrap">
        <div class="state-icon" style="color:var(--gold)"><i class="fas fa-spinner fa-pulse"></i></div>
        <div class="state-title">Loading report…</div>
        <div class="state-sub">Fetching certification data.</div>
    </div>
</main>

<script>
const API_BASE = 'http://127.0.0.1:5000';
function fmt(v, d=4) { return v != null ? Number(v).toFixed(d) : '—'; }
function fmtPct(v, d=1) { return v != null ? (Number(v)*100).toFixed(d)+'%' : '—'; }

function verdictColor(s) { return s>=0.80?'var(--green)':s>=0.65?'var(--amber)':'var(--red)'; }
function verdictLabel(s) { return s>=0.80?'CERTIFIED':s>=0.65?'CONDITIONAL':'BELOW STANDARD'; }
function certClass(s)    { return s>=0.80?'certified':s>=0.65?'conditional':'fail'; }
function dimSev(s)       { return s>=0.80?'pass':s>=0.65?'warn':'fail'; }
function dimLabel(s)     { return s>=0.80?'PASS':s>=0.65?'MARGINAL':'FAIL'; }

function renderReport(data, evalId) {
    const cert    = data.certificate || {};
    const comp    = data.compliance  || [];
    const summary = data.compliance_summary || {};
    const trail   = data.audit_trail || [];
    const shap    = data.shap_audit  || {};
    const score   = data.ethical_score || 0;
    const records = data.records || 0;
    const fairness = data.fairness_raw || data.fairness || {};

    const cls   = certClass(score);
    const color = verdictColor(score);
    const label = verdictLabel(score);

    _certData = { org: cert.organization||'FairTrust AI', modelName: cert.model_name||'—', score, label, cls, issuedAt: cert.issued_at||'—', validUntil: cert.valid_until||'—', evalId };

    // ── Alert banner ──────────────────────────────────────────────────────
    let alertCls, alertIcon, alertTitle, alertSub;
    if (score >= 0.80) {
        alertCls='ok'; alertIcon='fa-check-circle';
        alertTitle='Model Meets All Ethical AI Standards';
        alertSub='This model has passed all 7 fairness dimensions and is certified for deployment.';
    } else if (score >= 0.65) {
        alertCls='warn'; alertIcon='fa-exclamation-circle';
        alertTitle='Conditional Certification — Remediation Required';
        alertSub=`${summary.failed||0} compliance check${(summary.failed||0)!==1?'s':''} failed. The model may be deployed with conditions but requires immediate remediation.`;
    } else {
        alertCls='fail'; alertIcon='fa-times-circle';
        alertTitle='Model Does Not Meet Minimum Fairness Thresholds';
        alertSub=`${summary.failed||0} critical failure${(summary.failed||0)!==1?'s':''} detected. Deployment is not recommended until these issues are resolved.`;
    }

    // ── Compliance table rows ─────────────────────────────────────────────
    const REQ_DESC = {
        '80% Rule (Disparate Impact)': 'Ratio of lowest-to-highest group approval rate must be ≥ 0.80 (EEOC four-fifths rule)',
        'Statistical Parity (DP gap)': 'Maximum allowed outcome gap across demographic groups',
        'Calibration Error (Brier)':   'Predicted probabilities must closely match actual outcome rates',
        'Individual Fairness':         'Similar individuals must receive consistent predictions',
        'Group Fairness':              'Protected groups must have equal opportunity scores',
        'Demographic Parity Score':    'Positive outcome rates must be broadly comparable across groups',
        'Counterfactual Fairness':     'Changing only a protected attribute must not change the prediction',
    };
    const compRows = comp.map(r => {
        const sv   = r.passed ? 'pass' : 'fail';
        const icon = r.passed ? 'fa-check-circle' : 'fa-times-circle';
        return `<tr>
            <td><div class="req-name">${r.requirement}</div><div class="req-desc">${REQ_DESC[r.requirement]||''}</div></td>
            <td><span class="mono-val">${r.threshold}</span></td>
            <td><span class="mono-val">${r.achieved}</span></td>
            <td><span class="status-pill ${sv}"><i class="fas ${icon}"></i> ${r.status}</span></td>
        </tr>`;
    }).join('');

    // ── 7 dimension mini-cards ────────────────────────────────────────────
    // Build scoreMap from compliance rows (each row has a known fairness key)
    const scoreMap = {};
    comp.forEach(r => {
        const achieved = parseFloat(r.achieved);
        // ≤ threshold means lower is better → convert to 0-1 score
        const s = r.threshold.startsWith('≤') ? Math.max(0, 1 - achieved) : achieved;
        scoreMap[r.requirement] = s;
    });

    // Map requirement labels → dimension display names
    const dimDefs = [
        { name: 'Individual Fairness', reqKey: 'Individual Fairness',       rawKey: 'individualFairness' },
        { name: 'Group Fairness',      reqKey: 'Group Fairness',            rawKey: 'groupFairness' },
        { name: 'Demographic Bias',    reqKey: 'Demographic Parity Score',  rawKey: 'demographicParity',  invert: true },
        { name: 'Calibration',         reqKey: 'Calibration Error (Brier)', rawKey: 'calibrationError',   invert: true },
        { name: 'Disparate Impact',    reqKey: '80% Rule (Disparate Impact)',rawKey: 'disparateImpact' },
        { name: 'Counterfactual',      reqKey: 'Counterfactual Fairness',   rawKey: 'counterfactual' },
        { name: 'Intersectional',      reqKey: null,                        rawKey: 'intersectional' },
    ];

    // Resolve each dimension score: prefer compliance-derived, fall back to raw fairness
    const resolvedDims = dimDefs.map(d => {
        let s = null;
        if (d.reqKey && scoreMap[d.reqKey] != null) {
            s = scoreMap[d.reqKey];
        } else if (fairness[d.rawKey] != null) {
            const raw = parseFloat(fairness[d.rawKey]);
            s = d.invert ? Math.max(0, 1 - raw) : raw;
        }
        return { ...d, score: s };
    });

    // Count passing from the ACTUAL resolved scores (not from summary.passed which
    // counts compliance rows which have stricter thresholds than the 0.80 display threshold)
    const dimPassCount = resolvedDims.filter(d => d.score != null && d.score >= 0.80).length;
    const dimFailCount = resolvedDims.filter(d => d.score != null && d.score < 0.80).length;

    const dimCards = resolvedDims.map(d => {
        const s   = d.score != null ? d.score : score; // fall back to overall only if truly missing
        const sv  = dimSev(s);
        const w   = Math.round(s * 100);
        return `<div class="dim-mini-card ${sv}-card">
            <div class="dim-mini-name">${d.name}</div>
            <div class="dim-mini-score ${sv}">${w}<span style="font-size:0.75rem;opacity:0.5">/100</span></div>

            <div class="dim-mini-status ${sv}">${dimLabel(s)}</div>

    // ── Timeline ──────────────────────────────────────────────────────────
    const timelineHtml = trail.map(e => `
        <div class="timeline-item">
            <div class="timeline-dot"></div>

    // ── SHAP cards ────────────────────────────────────────────────────────
    const shapCardsHtml = shap.top_feature ? `

    // ── Legal table (5 frameworks, derived from real evaluation data) ─────
    const diPasses  = (parseFloat(fairness.disparateImpact||0)) >= 0.80;

    const legalRows = [
        {
            fw:     '🇮🇳 India — NITI Aayog Responsible AI',

            cls:    'pass',
        },
        {
            fw:     '🇪🇺 EU AI Act — High-Risk AI Requirements',

                        ? 'Model meets Limited Risk thresholds. Transparency, documentation, and human oversight requirements satisfied.'
                        : 'Model may be classified as High Risk. Bias testing, documentation, and human oversight obligations apply.',

            cls:    euReady ? 'pass' : 'warn',
        },
        {
            fw:     '🔒 GDPR — Automated Decision-Making (Art. 22)',
            note:   'Right to explanation supported through SHAP explainability. Automated decisions are logged in the audit trail.',
            status: 'Compliant',
            cls:    'pass',
        },
        {
            fw:     'EEOC 80% Rule (Disparate Impact)',
            note:   diPasses
                        ? `Disparate impact ratio is ${fmtPct(fairness.disparateImpact)} — above the required 80% threshold.`
                        : `Disparate impact ratio is ${fmtPct(fairness.disparateImpact)} — below the required 80% threshold. Legal liability applies.`,
            status: diPasses ? 'Compliant' : 'Non-Compliant',
            cls:    diPasses ? 'pass' : 'fail',
        },
        {
            fw:     'India IT Act 2000 — Data Protection',
            note:   hasPII
                        ? 'Personal data detected in training set. Data processing agreements and anonymisation required before deployment.'
                        : 'No direct PII detected. Data handling appears to comply with data protection requirements.',
            status: hasPII ? 'Review Required' : 'Documented',
            cls:    hasPII ? 'warn' : 'pass',
        },
    ];

    const legalTableRows = legalRows.map(r => `<tr>
        <td><div class="legal-fw">${r.fw}</div></td>
        <td><div class="legal-note">${r.note}</div></td>
        <td><span class="legal-pill ${r.cls}"><i class="fas ${r.cls==='pass'?'fa-check-circle':r.cls==='warn'?'fa-exclamation-circle':'fa-times-circle'}"></i> ${r.status}</span></td>
    </tr>`).join('');

    // ── Assemble ──────────────────────────────────────────────────────────
    document.getElementById('app').innerHTML = `

        <div class="report-hero">
            <div class="hero-badge"><i class="fas fa-shield-alt"></i> Regulator Report</div>

            <div class="hero-actions">

                <button class="btn-hero btn-hero-ghost" onclick="exportJSON()"><i class="fas fa-download"></i> Export JSON</button>
                <a href="allReports.html?eval_id=${evalId}" class="btn-hero btn-hero-ghost"><i class="fas fa-arrow-left"></i> All Reports</a>
            </div>
            <div class="verdict-row">
                <div class="verdict-score-box">
                    <div class="verdict-score-num" style="color:${color}">${Math.round(score*100)}</div>
                    <div class="verdict-score-sub">/ 100 Ethical Score</div>
                    <div class="verdict-score-label" style="color:${color}">${label}</div>
                </div>
                <div class="verdict-breakdown">
                    <div class="verdict-item"><div class="verdict-item-label">Records Evaluated</div><div class="verdict-item-val">${records?records.toLocaleString():'—'}</div></div>
                    <div class="verdict-item"><div class="verdict-item-label">Dimensions Passing</div><div class="verdict-item-val" style="color:${dimPassCount===7?'#34D399':'#FBBF24'}">${dimPassCount} / 7</div></div>
                    <div class="verdict-item"><div class="verdict-item-label">Issue Date</div><div class="verdict-item-val" style="font-size:0.75rem">${cert.issued_at||'—'}</div></div>
                    <div class="verdict-item"><div class="verdict-item-label">Valid Until</div><div class="verdict-item-val" style="font-size:0.75rem">${cert.valid_until||'—'}</div></div>
                </div>
            </div>
        </div>

        <div class="alert-banner ${alertCls}">
            <div class="alert-icon ${alertCls}"><i class="fas ${alertIcon}"></i></div>
            <div><div class="alert-title">${alertTitle}</div><div class="alert-sub">${alertSub}</div></div>

        <!-- CERTIFICATE -->
        <div class="section">
            <div class="section-head">

            </div>
            <div class="section-body" style="padding:1.25rem">
                <div class="cert-wrap">
                    <div class="cert-corner tl"></div><div class="cert-corner tr"></div>

                        <div class="cert-header-left">
                            <div class="cert-seal"><i class="fas fa-shield-alt"></i></div>
                            <div><div class="cert-issuer">Certificate of</div><div class="cert-issuer-name">FairTrust AI Compliance</div></div>
                        </div>
                        <span class="cert-status-pill ${cls}">${label}</span>

                    <div class="cert-body">
                        <div>
                            <div class="cert-certifies">This is to certify that</div>
                            <div class="cert-org">${cert.organization||'FairTrust AI'}</div>
                            <div class="cert-model"><i class="fas fa-microchip"></i> ${cert.model_name||'—'}</div>
                            <span class="cert-score-badge ${cls}">
                                <i class="fas ${cls==='certified'?'fa-check-circle':cls==='conditional'?'fa-exclamation-circle':'fa-times-circle'}"></i>
                                Fairness Score: ${Math.round(score*100)} / 100 — ${label}
                            </span>
                            <div class="cert-dates">
                                <div class="cert-date"><i class="fas fa-calendar-check"></i> Issued: <strong>${cert.issued_at||'—'}</strong></div>
                                <div class="cert-date"><i class="fas fa-hourglass-half"></i> Valid until: <strong>${cert.valid_until||'—'}</strong></div>
                            </div>
                        </div>
                        <div class="cert-qr-wrap">
                            <div class="cert-qr">EVAL<br>${evalId?evalId.slice(0,8):'—'}<br>···</div>
                            <div class="cert-id-label">Eval ID<br>${evalId?evalId.slice(0,18)+'…':'—'}</div>
                        </div>
                    </div>
                    <div class="cert-statement">
                        This model has been evaluated across <strong>all 7 fairness dimensions</strong> by the FairTrust AI Automated Ethics Framework and
                        <strong>${cls==='certified'?'fully meets':'partially meets'}</strong> the required standards for ethical AI deployment.
                        ${cls!=='certified'?'<strong style="color:var(--amber)"> Conditions apply — see compliance table below.</strong>':''}
                        <div style="margin-top:1rem;text-align:center">
                            <button onclick="downloadCert()" style="display:inline-flex;align-items:center;gap:7px;padding:0.65rem 1.5rem;background:var(--navy);color:white;border:none;border-radius:9px;font-family:var(--body);font-size:0.875rem;font-weight:700;cursor:pointer;">
                                <i class="fas fa-download"></i> Download Certificate (PNG)
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- FAIRNESS SNAPSHOT -->
        <div class="section">
            <div class="section-head">
                <div class="section-title"><i class="fas fa-th-large"></i> Fairness Snapshot — 7 Dimensions</div>
                <span style="font-size:0.8rem;color:var(--muted)">${dimPassCount} passing · ${dimFailCount} need attention · Threshold: ≥ 80</span>
            </div>
            <div class="section-body">
                <div style="background:var(--bg);border:1px solid var(--rule);border-radius:8px;padding:0.75rem 1rem;margin-bottom:1.25rem;font-size:0.8125rem;color:var(--muted);display:flex;align-items:flex-start;gap:8px;">
                    <i class="fas fa-info-circle" style="color:var(--gold);flex-shrink:0;margin-top:2px"></i>
                    <span>These 7 dimensions represent a comprehensive view of model fairness. A score below 80 indicates a concern that should be addressed before or after deployment. <strong style="color:var(--navy)">Critical failures (score &lt; 65) require immediate remediation.</strong></span>
                </div>
                <div class="dim-overview-grid">${dimCards}</div>
            </div>
        </div>

        <!-- COMPLIANCE TABLE -->
        <div class="section">
            <div class="section-head">
                <div class="section-title"><i class="fas fa-clipboard-check"></i> Fairness Contract — Detailed Compliance</div>
                <div style="display:flex;gap:0.5rem">
                    <span class="chip chip-neutral"><i class="fas fa-list"></i> ${summary.total??'—'} Total</span>
                    <span class="chip chip-pass"><i class="fas fa-check"></i> ${summary.passed??'—'} Passed</span>
                    ${(summary.failed||0)>0?`<span class="chip chip-fail"><i class="fas fa-times"></i> ${summary.failed} Failed</span>`:''}
                </div>
            </div>
            <div class="section-body" style="padding:0">
                <div style="padding:0.75rem 1.5rem;background:var(--bg);border-bottom:1px solid var(--rule);font-size:0.8125rem;color:var(--muted)">
                    <i class="fas fa-balance-scale" style="color:var(--gold);margin-right:6px"></i>

                </div>

                </table>

        </div>

        <!-- AUDIT TRAIL -->
        <div class="section">
            <div class="section-head">
                <div class="section-title"><i class="fas fa-history"></i> Evaluation Audit Trail</div>
                <span style="font-size:0.8rem;color:var(--muted)">Chronological · Tamper-evident log</span>
            </div>
            <div class="section-body">
                <div style="background:var(--bg);border:1px solid var(--rule);border-radius:8px;padding:0.75rem 1rem;margin-bottom:1.5rem;font-size:0.8125rem;color:var(--muted)">
                    <i class="fas fa-info-circle" style="color:var(--gold);margin-right:6px"></i>
                    This log records every step of the automated evaluation pipeline. It demonstrates due diligence and is suitable for regulatory submission.
                </div>
                <div class="timeline">${timelineHtml}</div>
                <div style="margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--rule)">

                        <i class="fas fa-chart-bar" style="color:var(--gold)"></i> Explainability Audit (SHAP)
                    </div>
                    <div style="font-size:0.8125rem;color:var(--muted);margin-bottom:0.5rem">
                        SHAP (SHapley Additive exPlanations) quantifies each feature's contribution to model predictions. Feature stability measures consistency across samples. <strong style="color:var(--navy)">Values near 1.0 indicate a stable, reliable model.</strong>
                    </div>
                    ${shapCardsHtml}
                </div>
            </div>
        </div>

        <!-- LEGAL FRAMEWORKS — table style matching remediation report -->
        <div class="section">
            <div class="section-head">
                <div class="section-title"><i class="fas fa-gavel"></i> Legal &amp; Regulatory Framework Alignment</div>
            </div>
            <div class="section-body">
                <div style="background:var(--bg);border:1px solid var(--rule);border-radius:8px;padding:0.75rem 1rem;margin-bottom:1.25rem;font-size:0.8125rem;color:var(--muted)">
                    <i class="fas fa-info-circle" style="color:var(--gold);margin-right:6px"></i>
                    Alignment is assessed automatically based on evaluation results. <strong style="color:var(--navy)">This does not constitute legal advice.</strong> Consult qualified legal counsel for formal compliance determination.
                </div>
                <table class="legal-table">
                    <thead><tr><th style="width:30%">Framework</th><th>Assessment</th><th style="width:160px">Status</th></tr></thead>
                    <tbody>${legalTableRows}</tbody>
                </table>
            </div>
        </div>
    `;
}

let _certData = null;
function downloadPDF() { setTimeout(() => window.print(), 100); }
function exportJSON() {
    const cached = sessionStorage.getItem('eval_result');
    if (!cached) { alert('No data to export.'); return; }
    const blob = new Blob([cached], { type:'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'regulator_report.json'; a.click();
}

function downloadCert() {
    if (!_certData) { alert('Certificate data not yet loaded.'); return; }
    const { org, modelName, score, label, cls, issuedAt, validUntil, evalId } = _certData;
    const W=900,H=636; const canvas=document.createElement('canvas'); canvas.width=W*2; canvas.height=H*2;
    const ctx=canvas.getContext('2d'); ctx.scale(2,2);
    const NAVY='#0F1E38',GOLD='#EBB255',WHITE='#FFFFFF',MUTED='#64748B',GREEN='#10B981',AMBER='#F59E0B',RED='#EF4444';
    const statusColor=cls==='certified'?GREEN:cls==='conditional'?AMBER:RED;
    ctx.fillStyle=WHITE; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(15,30,56,0.035)'; ctx.lineWidth=0.5;
    for(let x=0;x<W;x+=32){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    const pad=18;
    roundRect(ctx,pad,pad,W-pad*2,H-pad*2,12); ctx.strokeStyle=NAVY; ctx.lineWidth=2; ctx.stroke();
    const pad2=28; roundRect(ctx,pad2,pad2,W-pad2*2,H-pad2*2,8); ctx.strokeStyle=GOLD+'55'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle=NAVY; roundRectTop(ctx,pad,pad,W-pad*2,72,12); ctx.fill();
    drawShield(ctx,60,pad+36,20,GOLD);
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='500 10px "Plus Jakarta Sans",sans-serif'; ctx.textAlign='left'; ctx.fillText('CERTIFICATE OF',92,pad+27);
    ctx.fillStyle=WHITE; ctx.font='700 15px "Plus Jakarta Sans",sans-serif'; ctx.fillText('FAIRTRUST AI COMPLIANCE',92,pad+48);
    const pillLabel=label.toUpperCase(); ctx.font='700 10px "Plus Jakarta Sans",sans-serif';
    const pillW=ctx.measureText(pillLabel).width+24; const pillX=W-pad-pillW-16; const pillY=pad+20;
    roundRect(ctx,pillX,pillY,pillW,26,13); ctx.fillStyle=statusColor+'25'; ctx.fill(); ctx.strokeStyle=statusColor+'55'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle=statusColor; ctx.textAlign='center'; ctx.fillText(pillLabel,pillX+pillW/2,pillY+17);
    const contentY=pad+72+36; ctx.textAlign='center';
    ctx.fillStyle=MUTED; ctx.font='400 12px "Plus Jakarta Sans",sans-serif'; ctx.fillText('This is to certify that',W/2,contentY);
    ctx.fillStyle=NAVY; ctx.font='800 34px "Plus Jakarta Sans",sans-serif'; ctx.fillText(org,W/2,contentY+46);
    const orgW=ctx.measureText(org).width; ctx.fillStyle=GOLD; ctx.fillRect(W/2-orgW/2,contentY+53,orgW,2);
    ctx.fillStyle=MUTED; ctx.font='500 12px "Plus Jakarta Sans",sans-serif'; ctx.fillText(`Model: ${modelName}`,W/2,contentY+78);
    const badgeY=contentY+106; const badgeW=260,badgeH=36;
    roundRect(ctx,W/2-badgeW/2,badgeY-22,badgeW,badgeH,18); ctx.fillStyle=statusColor+'18'; ctx.fill(); ctx.strokeStyle=statusColor+'55'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle=statusColor; ctx.font='700 14px "Plus Jakarta Sans",sans-serif'; ctx.textAlign='center';
    ctx.fillText(`Score: ${Math.round(score*100)} / 100  —  ${label}`,W/2,badgeY+2);
    ctx.fillStyle='#374151'; ctx.font='400 11.5px "Plus Jakarta Sans",sans-serif'; ctx.textAlign='center';
    ctx.fillText(`has been evaluated across all 7 fairness dimensions by the FairTrust AI`,W/2,contentY+162);
    ctx.fillText(`Automated Ethics Framework and ${cls==='certified'?'fully meets':'partially meets'} the required standards.`,W/2,contentY+178);
    const dateY=H-pad-80; ctx.strokeStyle='rgba(15,30,56,0.1)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad+40,dateY-10); ctx.lineTo(W-pad-40,dateY-10); ctx.stroke();
    ctx.textAlign='left'; ctx.fillStyle=GOLD; ctx.font='600 9px "Plus Jakarta Sans",sans-serif'; ctx.fillText('ISSUED',pad+50,dateY+10);
    ctx.fillStyle=NAVY; ctx.font='600 11px "Plus Jakarta Sans",sans-serif'; ctx.fillText(issuedAt,pad+50,dateY+26);

    canvas.toBlob(blob=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`fairtrust_certificate_${(evalId||'cert').slice(0,8)}.png`;a.click();URL.revokeObjectURL(url);},'image/png');
}

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function roundRectTop(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function drawShield(ctx,cx,cy,size,color){ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(cx,cy-size);ctx.bezierCurveTo(cx+size*0.9,cy-size*0.8,cx+size*0.9,cy+size*0.1,cx,cy+size);ctx.bezierCurveTo(cx-size*0.9,cy+size*0.1,cx-size*0.9,cy-size*0.8,cx,cy-size);ctx.fill();ctx.strokeStyle='#0F1E38';ctx.lineWidth=size*0.12;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(cx-size*0.32,cy);ctx.lineTo(cx-size*0.05,cy+size*0.3);ctx.lineTo(cx+size*0.38,cy-size*0.25);ctx.stroke();}

(async function init() {
    const evalId = new URLSearchParams(location.search).get('eval_id') || sessionStorage.getItem('eval_id');
    if (!evalId) {
        document.getElementById('app').innerHTML = `<div class="state-wrap"><div class="state-icon" style="color:var(--amber)"><i class="fas fa-exclamation-circle"></i></div><div class="state-title">No evaluation found</div><div class="state-sub">Complete an evaluation on the upload page first.</div><a href="upload.html" style="display:inline-flex;align-items:center;gap:6px;margin-top:1.5rem;padding:10px 20px;background:var(--navy);color:white;border-radius:8px;text-decoration:none;font-weight:600;font-size:0.875rem"><i class="fas fa-play-circle"></i> Start evaluation</a></div>`;
        return;
    }
    try {
        const res  = await fetch(`${API_BASE}/report/regulator/${evalId}`);
        const data = await res.json();
        if (res.ok && data.status === 'complete') { renderReport(data, evalId); return; }
        throw new Error(data.error || 'not complete');
    } catch (_) {
        const cached = sessionStorage.getItem('eval_result');
        if (cached) {
            const raw     = JSON.parse(cached);
            const fairness = raw.fairness || {};
            const score   = raw.ethical_score || 0;
            const now     = new Date();
            const RULES = [
                { key:'disparateImpact',    min:0.80, label:'80% Rule (Disparate Impact)' },
                { key:'demographicParity',  max:0.05, label:'Statistical Parity (DP gap)', raw_key:'demographicParity' },
                { key:'calibrationError',   max:0.05, label:'Calibration Error (Brier)',   raw_key:'calibrationError' },
                { key:'individualFairness', min:0.85, label:'Individual Fairness' },
                { key:'groupFairness',      min:0.80, label:'Group Fairness' },
                { key:'demographicParity',  min:0.75, label:'Demographic Parity Score', transform:v=>Math.max(0,1-v) },
                { key:'counterfactual',     min:0.90, label:'Counterfactual Fairness' },
            ];
            const compliance = RULES.map(r => {
                const raw_v = fairness[r.raw_key||r.key] || 0;
                const v     = r.transform ? r.transform(raw_v) : raw_v;
                const passed = r.min!=null ? v>=r.min : v<=r.max;
                return { requirement:r.label, threshold:r.min!=null?`≥ ${r.min}`:`≤ ${r.max}`, achieved:v.toFixed(4), passed, status:passed?'PASS':'FAIL' };
            });
            const passed = compliance.filter(r=>r.passed).length;
            renderReport({
                ethical_score: score, records: raw.records,
                fairness_raw:  fairness,
                privacy:       raw.privacy || {},
                certificate: {
                    organization: 'FairTrust AI',
                    model_name:   `Model ${(raw.model_id||'').slice(0,8)}`,
                    fairness_score: score,
                    issued_at:   now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}),
                    valid_until: new Date(new Date().setFullYear(now.getFullYear()+1)).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}),
                    certified: passed===compliance.length, status: passed===compliance.length?'CERTIFIED':'CONDITIONAL',
                },
                compliance,
                compliance_summary: { total:compliance.length, passed, failed:compliance.length-passed, all_passed:passed===compliance.length },
                audit_trail: [
                    { timestamp:now.toUTCString(), title:'Certification Issued', detail:`Fairness evaluation certified with score ${score.toFixed(4)}` },
                    { timestamp:new Date(now-60000).toUTCString(), title:'Report Generation', detail:'Developer, Regulator, and End-User reports generated' },
                    { timestamp:new Date(now-120000).toUTCString(), title:'Fairness Analysis Complete', detail:'All 7 dimensions evaluated' },
                ],
                shap_audit: raw.shap ? {
                    top_feature:      raw.shap.topFeature,
                    stability_pct:    Math.round((raw.shap.featureStability||0)*100),
                    shap_range:       `[${(raw.shap.shapMin||0).toFixed(4)}, ${(raw.shap.shapMax||0).toFixed(4)}]`,
                    top_feature_shap: (raw.shap.shapMax||0).toFixed(4),
                } : {},
            }, evalId);
            return;
        }
        document.getElementById('app').innerHTML = `<div class="state-wrap"><div class="state-icon" style="color:var(--red)"><i class="fas fa-times-circle"></i></div><div class="state-title">Could not load report</div><div class="state-sub">Could not fetch regulator report. Please try again.</div></div>`;
    }
})();
</script>
